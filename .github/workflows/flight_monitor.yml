name: FlightRadar24 Target Monitor

on:
  schedule:
    - cron: '*/30 * * * *' # 每 30 分鐘自動監控一次
  workflow_dispatch: # 支援點擊按鈕手動測試

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Check out 程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 執行監控並推播
        env:
          DISCORD: ${{ secrets.DISCORD }} 
        run: python Bot.py
